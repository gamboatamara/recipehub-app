name: Deploy RecipeHub

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm -v

      - name: Install backend dependencies
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Run backend tests if available
        working-directory: backend
        run: pnpm test || echo "No backend tests configured"

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: |
          echo "VITE_API_URL=https://api.recipehubapp.xyz/api" > .env.production
          pnpm build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/recipehub_deploy_key
          chmod 600 ~/.ssh/recipehub_deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy frontend build to Nginx
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/recipehub_deploy_key" frontend/dist/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/recipehubapp/app/

      - name: Deploy backend and MongoDB with Docker Compose
        run: |
          ssh -i ~/.ssh/recipehub_deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'REMOTE'
            set -e

            cd /opt/recipehub

            git fetch origin main
            git reset --hard origin/main

            printf "%s\n" \
              "PORT=4000" \
              "NODE_ENV=production" \
              "MONGO_INITDB_ROOT_USERNAME=${{ secrets.MONGO_ROOT_USERNAME }}" \
              "MONGO_INITDB_ROOT_PASSWORD=${{ secrets.MONGO_ROOT_PASSWORD }}" \
              "MONGO_INITDB_DATABASE=recipehub" \
              "MONGO_URI=${{ secrets.MONGO_URI }}" \
              "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
              "JWT_EXPIRES_IN=7d" \
              > .env

            docker compose up -d --build
            docker image prune -f
          REMOTE

      - name: Health check
        run: |
          for i in {1..12}; do
            echo "Health check attempt $i..."
            if curl -f https://api.recipehubapp.xyz/api/health; then
              echo "API is healthy"
              exit 0
            fi
            echo "API not ready yet, waiting 10 seconds..."
            sleep 10
          done

          echo "API health check failed after retries"
          exit 1
