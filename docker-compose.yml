services:
  mongo:
    image: mongo:7
    container_name: recipehub-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    volumes:
      - mongo_data:/data/db
    networks:
      - recipehub-net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recipehub-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    depends_on:
      - mongo
    networks:
      - recipehub-net

volumes:
  mongo_data:
    name: recipehub-mongo-data

networks:
  recipehub-net:
    driver: bridge
